version: "3.9"

services:

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  fastapi_app:
    build:
      context: .          # adjust to ./backend if your Dockerfile lives there
      dockerfile: Dockerfile
    container_name: fastapi_app
    restart: unless-stopped
    environment:
      # Add your FastAPI env vars here (DB URL, secrets, etc.)
      - DATABASE_URL=${DATABASE_URL}
      # Allow the nginx frontend container as a CORS origin
      - CORS_ORIGINS=http://frontend,http://localhost:3000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── React Frontend (served by nginx) ──────────────────────────────────────
  frontend:
    build:
      context: .           # root of uae-map-app (contains package.json + src/)
      dockerfile: frontend/Dockerfile
      args:
        # Points to the nginx proxy location so /api/* is forwarded to fastapi_app
        REACT_APP_API_URL: ""   # empty = relative path; nginx proxies /api → fastapi_app
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      fastapi_app:
        condition: service_healthy

networks:
  default:
    name: cpx_net
